<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>GeoEnrich Dashboard</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/dashboard.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static',filename='assets/favicon.ico') }}" />
</head>
<body>
    <h1>GeoEnrich Dashboard</h1>


    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
    </script>

    <div class="dashboard">
        <!-- LEFT COLUMN -->
        <div class="left">

            <!-- SECTION 1 -->
            <div class="section">
                <h2>1. Upload CSV</h2>

                <form id="datasetform" method="POST" action="/uploadFile" enctype="multipart/form-data">

                    <div id="uploadBox" class="upload-box">
                        <span id="uploadText">Drag & drop CSV here<br />or click to upload</span>
                        <input type="file" id="fileInput" accept=".csv" name="file" hidden />
                    </div>

                    <input id="startBtn" type="submit" name="submit1" value="Start" class="inputbutton" disabled />

                </form>

                <div id="stats" class="stats" style="display:none;"></div>
            </div>

            <div id="section2" class="section locked">
                <h2>2. Enrichment Settings</h2>

                <form id="varform" method="POST" action="/addVariables" enctype='application/x-www-form-urlencoded'>
                    <label>Variables</label>
                    <select id="variableSelect">
                        <option value="">Loading variables...</option>
                    </select>

                    <div id="selectedVariables" name = "selectedVariables" class="variable-list"></div>
                    <input type="hidden" id="selectedVariablesList" name="selectedVariablesList" />

                    <label>Geographic buffer (km)</label>
                    <input type="number" id="bufferInput" name="bufferInput" placeholder="e.g. 5" />

                    <label>Depth mode</label>
                    <select id="depthMode" name="depthMode">
                        <option value="surface">Surface</option>
                        <option value="all">All depths</option>
                        <option value="nearest">Survey depth</option>
                    </select>

                    <input id="enrichBtn" type="submit" name="submit2" value="Add variables" class="inputbutton" disabled />
                </form>

            </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">

            <div id="section3" class="section locked">
                <h2>3. Processing Progress</h2>
                <div id="progressContainer">
                    <p class="muted">Start enrichment to see progress.</p>
                </div>
            </div>

            <div id="section4" class="section locked">
                <h2>4. Export / Collate</h2>
                <p class="muted">Available once all variables are finished.</p>
                <div class="export-actions">
                    <button id="exportCsvBtn" disabled>Export CSV</button>
                    <button id="exportJsonBtn" disabled>Export JSON</button>
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script> 
</body>
</html>
