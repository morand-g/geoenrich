<!doctype html>
<html>
<head>
        <title data-i18n="title">GeoEnrich online</title>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/style.css') }}">
        <link rel="shortcut icon" href="{{ url_for('static',filename='assets/favicon.ico') }}" />
    </head>

<body>

<div class="login-root">
  <div class="box-root flex-flex flex-direction--column" style="min-height: 100vh;flex-grow: 1;">
    <div class="loginbackground box-background--white padding-top--64">
      <div class="loginbackground-gridContainer">

        <!-- background shapes (unchanged) -->
        <div class="box-root flex-flex" style="grid-area: top / start / 8 / end;">
          <div class="box-root" style="background-image: linear-gradient(white 0%, rgb(247, 250, 252) 33%); flex-grow: 1;"></div>
        </div>
        <div class="box-root flex-flex" style="grid-area: 6 / start / auto / 2;">
          <div class="box-root box-background--blue800" style="flex-grow: 1;"></div>
        </div>
        <div class="box-root flex-flex" style="grid-area: 7 / start / auto / 4;">
          <div class="box-root box-background--blue" style="flex-grow: 1;"></div>
        </div>

      </div>
    </div>

    <div class="box-root padding-top--24 flex-flex flex-direction--column center-center" style="z-index: 9;">
      <div class="formbg-outer">
        <div class="formbg">

          <!-- LANGUAGE -->
          <div class="language-container">
            <select id="language-select" class="language-select" onchange="setLanguage(this.value)">
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
              <option value="ar">العربية</option>
              <option value="zh">中文</option>
            </select>
          </div>

          <div class="formbg-inner padding-horizontal--48 center-center">

            <!-- LOGOS -->
            <div class="header-logos grid--50-50" style="margin-top:-15px;">
              <div class="flex-flex" style="justify-content:left;">
                <a href="/">
                  <img alt="G2OI" src="{{ url_for('static',filename='assets/logo_g2oi.png') }}">
                </a>
              </div>
              <div class="flex-flex" style="justify-content:right;">
                <a href="https://www.ird.fr/" target="_blank">
                  <img alt="IRD" height="58" src="{{ url_for('static',filename='assets/logo_ird.png') }}">
                </a>
              </div>
            </div>

            <div class="box-root padding-top--24 padding-bottom--24 flex-flex flex-justifyContent--center">
              <h1 data-i18n="title">GeoEnrich online</h1>
            </div>

            <!-- ===================== -->
            <!-- DASHBOARD – SECTION 1 -->
            <!-- ===================== -->

            <form method="POST" enctype="multipart/form-data">

              <!-- FILE UPLOAD -->
              <div class="grid--50-50">
                <label for="fileselect" data-i18n="selectFile">
                  Select your occurrences file* (max 100 MB):
                </label>
                <div class="reset-pass">
                  <a href="https://geoenrich.readthedocs.io/en/latest/online.html" target="_blank">
                    Formatting examples
                  </a>
                </div>
              </div>

              <div class="field padding-bottom--24">
                <label class="upload-box" for="fileselect" id="uploadBox">
                  <span class="upload-placeholder" id="uploadText">
                    Choose file or drag here
                  </span>
                  <input id="fileselect" type="file" name="file" accept=".csv">
                </label>
                <div id="fileError" class="file-error" style="color:red;display:none;">
                  File is too large! Maximum allowed size is 100 MB.
                </div>
              </div>

              <!-- VARIABLES (DEBUG VERSION) -->

                <div class="grid--50-50">
                  <label>Choose variables*:</label>
                </div>

                <div class="field padding-bottom--16" style="margin-bottom: 20px;">
                  <div class="dropdown">
                    <div class="dropdown-toggle">Available variables</div>
                    <div class="dropdown-menu" id="availableVariables"></div>
                  </div>
                </div>

                <div class="field padding-bottom--24" style="margin-top: 20px;">
                  <div class="dropdown">
                    <div class="dropdown-toggle">Selected variables (drag to reorder)</div>
                    <div class="dropdown-menu selected-list" id="selectedVariables"></div>
                  </div>
                </div>

                <input type="hidden" id="var_id" name="var_ids">

              <!-- SUBMIT -->
              <div id="error-message" style="color:red;text-align:center;display:none;"></div>

              <!-- <div class="field flex-flex center-center">
                <input type="submit" value="Continue" data-i18n="continue">
              </div> -->
              <div class="field flex-flex center-center">
                <input type="button" id="continueBtn" value="Continue" data-i18n="continue">
              </div>
              <!-- <button type="button" id="continueBtn">Continue</button> -->

            </form>
            




            <!-- ===================== -->
            <!-- DASHBOARD – SECTION 2 -->
            <!-- ===================== -->

            <div id="processing-section" style="display:none; margin-top:30px;">

              <h2 style="margin-bottom:20px;">Processing enrichment</h2>

              <div id="progress-container"></div>

            </div>

            <!-- <div class="progress-row">
            <div class="progress-label">Temperature</div>

            <div class="progress-bar-wrapper">
              <div class="progress-bar" style="width:0%"></div>
            </div>

            <div class="progress-status">Waiting</div> -->
            
          </div>

















            <!-- FOOTER LINKS -->
            <div class="flex-flex center-center grid--50-50 padding-top--24">
              <a class="secondary-link" href="https://geoenrich.readthedocs.io" target="_blank">
                Documentation
              </a>
              <a class="secondary-link" href="https://github.com/morand-g/geoenrich" target="_blank">
                Code & Support
              </a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="loading-content">
    <div class="spinner"></div>
    <h2>Processing your file... please wait ⏳</h2>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
