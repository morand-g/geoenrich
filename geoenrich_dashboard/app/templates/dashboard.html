<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeoEnrich Dashboard</title>
<link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/dashboard.css') }}">
</head>
<body>


<h1>GeoEnrich Dashboard</h1>


<div class="dashboard">
<!-- LEFT COLUMN -->
<div class="left">


<!-- SECTION 1 -->
<div class="section">
<h2>1. Upload CSV</h2>

<form method = "POST" action="/uploadFile" enctype="multipart/form-data">

<div id="uploadBox" class="upload-box">
<span id="uploadText">Drag & drop CSV here<br />or click to upload</span>
<input type="file" id="fileInput" accept=".csv" name="file" hidden />
</div>


<!-- <button  disabled>Start</button> -->
<input id="startBtn" type="submit" name="submit" value="Start" disabled />

</form>

<div id="stats" class="stats" style="display:none;"></div>
</div>


<!-- SECTION 2 -->
<div id="section2" class="section locked">
<h2>2. Enrichment Settings</h2>


<label>Variables</label>
<select id="variableSelect">
<option value="">Loading variables...</option>
</select>


<div id="selectedVariables" class="variable-list"></div>


<label>Geographic buffer (km)</label>
<input type="number" id="bufferInput" placeholder="e.g. 5" />


<label>Depth mode</label>
<select id="depthMode">
  <option value="surface">Surface</option>
  <option value="shallow">Shallow</option>
  <option value="deep">Deep</option>
</select>


<button id="enrichBtn">Start enrichment</button>
</div>


</div>


<!-- RIGHT COLUMN -->
<!-- <div class="right section">
  <h2>Processing Progress</h2>
  <div id="progressContainer" class="progress-container">
    <p class="muted">Start enrichment to see progress.</p>
  </div> -->

    <!-- Export / Collate Section -->
  <!-- <div id="section4" class="section locked">
    <h3>Export / Collate</h3>
    <p class="export-hint">Available once all variables are finished</p>
    <div class="export-actions">
      <button id="exportCsvBtn" disabled>Export CSV</button>
      <button id="exportJsonBtn" disabled>Export JSON</button>
    </div>
  </div>
</div> -->


<!-- RIGHT COLUMN -->
  <div class="right-column">
  <div id="section3" class="section locked">
    <h2>3. Processing Progress</h2>
    <div id="progressContainer">
      <p class="muted">Start enrichment to see progress.</p>
    </div>
  </div>

  <div id="section4" class="section locked">
    <h2>4. Export / Collate</h2>
    <p class="muted">Available once all variables are finished.</p>
    <div class="export-actions">
      <button id="exportCsvBtn" disabled>Export CSV</button>
      <button id="exportJsonBtn" disabled>Export JSON</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
