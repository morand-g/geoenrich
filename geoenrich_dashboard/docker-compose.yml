services:
  web:
    image: geoenrich_dashboard
    build: .
    container_name: geoenrich_dashboard
    restart: always
    volumes:
      - ./app:/app
      - /data/venvs/copmarine/lib/python3.10/site-packages/geoenrich:/home/geoenrich_host
      - /data/data/geoenrich_dashboard_data:/home/data
    ports:
      - "8081:8080"
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - COPERNICUS_TOKEN=${COPERNICUS_TOKEN}
    working_dir: /app
    depends_on:
      - redis
      - worker
    command: bash -c "cp /usr/local/lib/python3.10/site-packages/geoenrich/data/catalog.csv /app/static/js/ \
      && cp /home/geoenrich_host/data/personal_catalog.csv /usr/local/lib/python3.10/site-packages/geoenrich/data/personal_catalog.csv \
      && python main.py"
  worker:
    image: geoenrich_dashboard
    build: .
    container_name: geoenrich_worker
    restart: always
    working_dir: /app
    volumes:
      - ./app:/app
      - /data/venvs/copmarine/lib/python3.10/site-packages/geoenrich:/home/geoenrich_host
      - /data/data/geoenrich_dashboard_data:/home/data
    environment:
      - COPERNICUS_TOKEN=${COPERNICUS_TOKEN}
    depends_on:
      - redis
    command: bash -c "mkdir -p /root/.copernicusmarine \
      && echo $COPERNICUS_TOKEN > /root/.copernicusmarine/.copernicusmarine-credentials \
      && cp /home/geoenrich_host/data/personal_catalog.csv /usr/local/lib/python3.10/site-packages/geoenrich/data/personal_catalog.csv \
      && celery -A main.celery worker --loglevel=INFO --statedb=/app/celery-working.state"
  redis:
    image: redis
    container_name: geoenrich_redis
    restart: always
      
