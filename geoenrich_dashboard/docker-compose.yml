services:
  web:
    image: geoenrich_dashboard
    build: .
    container_name: geoenrich_dashboard
    restart: always
    volumes:
      - ./app:/app
      - /data/data/geoenrich_dashboard_data:/home/data
    ports:
      - "8081:8080"
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    working_dir: /app
    depends_on:
      - redis
      - worker
    command: bash -c "python copy_my_files.py \
                      && python main.py"

  worker:
    image: geoenrich_dashboard
    build: .
    container_name: geoenrich_worker
    restart: always
    working_dir: /app
    volumes:
      - ./app:/app
      - /data/data/geoenrich_dashboard_data:/home/data
      - /data/data/geospatial:/geospatial
    depends_on:
      - redis
    command: bash -c "python copy_my_files.py \
      && celery -A main.celery worker --loglevel=INFO"

  redis:
    image: redis
    container_name: geoenrich_redis
    restart: always
      
