services:
  web:
    image: geoenrich_dashboard
    container_name: geoenrich_dashboard
    restart: always
    volumes:
      - ./app:/app
      - /data/venvs/copmarine/lib/python3.10/site-packages/geoenrich:/home/geoenrich_host
      - /data/data/geoenrich_dashboard_data:/home/data
    ports:
      - "8081:8080"
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - COPERNICUS_TOKEN=${COPERNICUS_TOKEN}
    working_dir: /app
    command: bash -c "mkdir -p /root/.copernicusmarine \
      && echo \"$COPERNICUS_TOKEN" > /root/.copernicusmarine/.copernicusmarine-credentials \
      && cp /usr/local/lib/python3.10/site-packages/geoenrich/data/catalog.csv /app/static/js/ \
      && cp /home/geoenrich_host/data/personal_catalog.csv /usr/local/lib/python3.10/site-packages/geoenrich/data/personal_catalog.csv \
      && cp /usr/local/lib/python3.10/site-packages/geoenrich/credentials_example.py /usr/local/lib/python3.10/site-packages/geoenrich/credentials.py \
      && redis-server --daemonize yes \
      && python main.py"
      #
      
