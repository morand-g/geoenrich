<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoEnrich Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1000px;
            margin-top: 20px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 10px 10px 0 0 !important;
        }
        .variable-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 10px;
        }
        .variable-item {
            padding: 8px;
            margin-bottom: 5px;
            background-color: #f8f9fa;
            border-radius: 5px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-inqueue {
            background-color: #ffc107;
            color: #212529;
        }
        .status-success {
            background-color: #28a745;
            color: white;
        }
        .status-failed {
            background-color: #dc3545;
            color: white;
        }
        .progress-container {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Input File Section -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Input CSV File</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="filePath" class="form-label">Path to CSV File</label>
                    <input type="text" class="form-control" id="filePath" placeholder="Enter path to your CSV file">
                </div>
            </div>
        </div>

        <!-- Variable Selection Section -->
        <div class="card">
            <div class="card-header" data-bs-toggle="collapse" data-bs-target="#variableCollapse" style="cursor: pointer;">
                <h5 class="mb-0">Select Variables</h5>
            </div>
            <div class="collapse show" id="variableCollapse">
                <div class="card-body">
                    <div class="variable-list" id="variableList">
                        <!-- Example variable items -->
                        <div class="variable-item">
                            <span>Population Density</span>
                            <i class="fas fa-grip-vertical"></i>
                        </div>
                        <div class="variable-item">
                            <span>Income Level</span>
                            <i class="fas fa-grip-vertical"></i>
                        </div>
                        <div class="variable-item">
                            <span>Education Index</span>
                            <i class="fas fa-grip-vertical"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Launch Enrichment Button -->
        <div class="d-grid gap-2 mb-4">
            <button class="btn btn-primary" id="launchEnrichment">Launch Enrichment</button>
        </div>

        <!-- Status Section -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Enrichment Status</h5>
                <button class="btn btn-sm btn-outline-secondary" id="refreshStatus">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            <div class="card-body">
                <div id="statusContainer">
                    <!-- Example status items -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <span>Population Density</span>
                            <span class="status-badge status-inqueue">In Queue</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress" style="display: none;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 50%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <span>Income Level</span>
                            <span class="status-badge status-success">Success</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <span>Education Index</span>
                            <span class="status-badge status-failed">Failed</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Normalization and Export Section (Hidden by default) -->
        <div class="card" id="exportSection" style="display: none;">
            <div class="card-header">
                <h5 class="mb-0">Normalization & Export</h5>
            </div>
            <div class="card-body">
                <div class="d-grid gap-2">
                    <button class="btn btn-success" id="normalizeData">Normalize Data</button>
                    <button class="btn btn-primary" id="exportData">Export Data</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script>
        // Enable drag-and-drop reordering for variables
        $(function() {
            $("#variableList").sortable({
                handle: ".fa-grip-vertical",
                cursor: "move"
            });
        });

        // Example: Show export section after enrichment is done
        document.getElementById('launchEnrichment').addEventListener('click', function() {
            // Simulate enrichment process
            setTimeout(function() {
                document.getElementById('exportSection').style.display = 'block';
            }, 3000);
        });

        // Example: Refresh statuses
        document.getElementById('refreshStatus').addEventListener('click', function() {
            alert("Statuses refreshed!");
        });

        // Example: Normalize and export data
        document.getElementById('normalizeData').addEventListener('click', function() {
            alert("Data normalized!");
        });

        document.getElementById('exportData').addEventListener('click', function() {
            alert("Data exported!");
        });
    </script>
</body>
</html>
